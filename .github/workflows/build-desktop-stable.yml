name: Build Desktop App (Stable)

on:
  workflow_dispatch:

concurrency:
  group: build-desktop-stable
  cancel-in-progress: true

env:
  CHANNEL: stable

jobs:
  build:
    name: Build for ${{ matrix.platform }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            arch: x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: msi,nsis
          - platform: windows
            arch: arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            bundle: msi,nsis
          - platform: macos
            arch: universal
            os: macos-latest
            target: universal-apple-darwin
            bundle: dmg
          - platform: linux
            arch: x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: appimage
          - platform: linux
            arch: arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bundle: appimage

    steps:
      - name: Setup SSH key for private repo
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRIVATE_REPO_DEPLOY_KEY }}

      - name: Clone private repository
        uses: actions/checkout@v5
        with:
          repository: fluxerapp-old/fluxer
          ssh-key: ${{ secrets.PRIVATE_REPO_DEPLOY_KEY }}

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: fluxer_app/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: fluxer_app
        run: pnpm install --frozen-lockfile

      - name: Prepare wrapper
        working-directory: fluxer_app
        env:
          BUILD_CHANNEL: stable
        run: pnpm prepare:wrapper

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: fluxer_app/src-tauri -> target
          prefix-key: ${{ matrix.target }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_CHANNEL: stable
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: fluxer_app
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p upload_staging
          cp -r fluxer_app/src-tauri/target/${{ matrix.target }}/release/bundle/* upload_staging/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fluxer-desktop-${{ env.CHANNEL }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: upload_staging/
          retention-days: 30

  upload:
    name: Upload builds to S3
    needs: build
    runs-on: ubuntu-latest
    env:
      AWS_S3_ENDPOINT: https://s3.us-east-va.io.cloud.ovh.us
      AWS_S3_BUCKET: fluxer-dl
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
    steps:
      - name: Setup SSH key for private repo
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRIVATE_REPO_DEPLOY_KEY }}

      - name: Clone private repository
        uses: actions/checkout@v5
        with:
          repository: fluxerapp-old/fluxer
          ssh-key: ${{ secrets.PRIVATE_REPO_DEPLOY_KEY }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload all builds to S3
        shell: bash
        run: |
          set -euo pipefail

          CHANNEL="${CHANNEL}"

          VERSION=$(python -c "import json; print(json.load(open('fluxer_app/src-tauri/tauri.conf.json'))['version'])")
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          WIN_X64_DIR="artifacts/fluxer-desktop-${CHANNEL}-windows-x64/nsis"
          WIN_X64_SETUP=$(ls "${WIN_X64_DIR}"/Fluxer_*_x64-setup.exe)
          WIN_X64_SIG_FILE="${WIN_X64_SETUP}.sig"
          WIN_X64_SIG=$(tr -d '\n' < "${WIN_X64_SIG_FILE}")

          WIN_ARM64_DIR="artifacts/fluxer-desktop-${CHANNEL}-windows-arm64/nsis"
          WIN_ARM64_SETUP=$(ls "${WIN_ARM64_DIR}"/Fluxer_*_arm64-setup.exe)
          WIN_ARM64_SIG_FILE="${WIN_ARM64_SETUP}.sig"
          WIN_ARM64_SIG=$(tr -d '\n' < "${WIN_ARM64_SIG_FILE}")

          MAC_DMG_DIR="artifacts/fluxer-desktop-${CHANNEL}-macos-universal/dmg"
          MAC_DMG=$(ls "${MAC_DMG_DIR}"/Fluxer_*_universal.dmg)

          MAC_DIR="artifacts/fluxer-desktop-${CHANNEL}-macos-universal/macos"
          MAC_TARGZ=$(ls "${MAC_DIR}"/*.app.tar.gz)
          MAC_SIG_FILE="${MAC_TARGZ}.sig"
          MAC_SIG=$(tr -d '\n' < "${MAC_SIG_FILE}")

          LINUX_X64_DIR="artifacts/fluxer-desktop-${CHANNEL}-linux-x64/appimage"
          LINUX_X64_APPIMAGE=$(ls "${LINUX_X64_DIR}"/*.AppImage)
          LINUX_X64_SIG_FILE="${LINUX_X64_APPIMAGE}.sig"
          LINUX_X64_SIG=$(tr -d '\n' < "${LINUX_X64_SIG_FILE}")

          LINUX_ARM64_DIR="artifacts/fluxer-desktop-${CHANNEL}-linux-arm64/appimage"
          LINUX_ARM64_APPIMAGE=$(ls "${LINUX_ARM64_DIR}"/*.AppImage)
          LINUX_ARM64_SIG_FILE="${LINUX_ARM64_APPIMAGE}.sig"
          LINUX_ARM64_SIG=$(tr -d '\n' < "${LINUX_ARM64_SIG_FILE}")

          aws s3 cp "${WIN_X64_SETUP}" \
            s3://${AWS_S3_BUCKET}/${CHANNEL}/windows/x64/fluxer.exe \
            --endpoint-url ${AWS_S3_ENDPOINT} \
            --content-type application/vnd.microsoft.portable-executable

          aws s3 cp "${WIN_ARM64_SETUP}" \
            s3://${AWS_S3_BUCKET}/${CHANNEL}/windows/arm64/fluxer.exe \
            --endpoint-url ${AWS_S3_ENDPOINT} \
            --content-type application/vnd.microsoft.portable-executable

          aws s3 cp "${MAC_DMG}" \
            s3://${AWS_S3_BUCKET}/${CHANNEL}/macos/universal/fluxer.dmg \
            --endpoint-url ${AWS_S3_ENDPOINT} \
            --content-type application/x-apple-diskimage

          aws s3 cp "${MAC_TARGZ}" \
            s3://${AWS_S3_BUCKET}/${CHANNEL}/macos/universal/fluxer.app.tar.gz \
            --endpoint-url ${AWS_S3_ENDPOINT} \
            --content-type application/gzip

          aws s3 cp "${LINUX_X64_APPIMAGE}" \
            s3://${AWS_S3_BUCKET}/${CHANNEL}/linux/x64/fluxer.AppImage \
            --endpoint-url ${AWS_S3_ENDPOINT} \
            --content-type application/x-executable

          aws s3 cp "${LINUX_ARM64_APPIMAGE}" \
            s3://${AWS_S3_BUCKET}/${CHANNEL}/linux/arm64/fluxer.AppImage \
            --endpoint-url ${AWS_S3_ENDPOINT} \
            --content-type application/x-executable

          LATEST_JSON_PATH="latest.json"

          cat > "${LATEST_JSON_PATH}" <<EOF
          {
            "version": "${VERSION}",
            "notes": "",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "windows-x86_64": {
                "url": "https://api.fluxer.app/dl/windows/x64/setup?channel=${CHANNEL}",
                "signature": "${WIN_X64_SIG}"
              },
              "windows-aarch64": {
                "url": "https://api.fluxer.app/dl/windows/arm64/setup?channel=${CHANNEL}",
                "signature": "${WIN_ARM64_SIG}"
              },
              "darwin-x86_64": {
                "url": "https://api.fluxer.app/dl/macos/universal/app_tar_gz?channel=${CHANNEL}",
                "signature": "${MAC_SIG}"
              },
              "darwin-aarch64": {
                "url": "https://api.fluxer.app/dl/macos/universal/app_tar_gz?channel=${CHANNEL}",
                "signature": "${MAC_SIG}"
              },
              "linux-x86_64": {
                "url": "https://api.fluxer.app/dl/linux/x64/appimage?channel=${CHANNEL}",
                "signature": "${LINUX_X64_SIG}"
              },
              "linux-aarch64": {
                "url": "https://api.fluxer.app/dl/linux/arm64/appimage?channel=${CHANNEL}",
                "signature": "${LINUX_ARM64_SIG}"
              }
            }
          }
          EOF

          aws s3 cp "${LATEST_JSON_PATH}" \
            s3://${AWS_S3_BUCKET}/desktop/${CHANNEL}/latest.json \
            --endpoint-url ${AWS_S3_ENDPOINT} \
            --content-type application/json
