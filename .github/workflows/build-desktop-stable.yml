name: Build Desktop App (Stable)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-desktop-stable
  cancel-in-progress: true

env:
  CHANNEL: stable

jobs:
  version:
    name: Bump Stable Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      pub_date: ${{ steps.bump.outputs.pub_date }}
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Calculate and push next tag
        id: bump
        run: go run ./scripts/ci/desktopci bump

  build:
    name: Build for ${{ matrix.platform }} (${{ matrix.arch }})
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            arch: x64
            os: windows-latest
            electron_arch: x64
          - platform: windows
            arch: arm64
            os: windows-latest
            electron_arch: arm64
          - platform: macos
            arch: universal
            os: macos-26
            electron_arch: universal
          - platform: linux
            arch: x64
            os: ubuntu-22.04
            electron_arch: x64
          - platform: linux
            arch: arm64
            os: ubuntu-24.04-arm
            electron_arch: arm64

    steps:
      - name: Setup SSH key for private repo
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRIVATE_REPO_DEPLOY_KEY }}

      - name: Clone private repository
        uses: actions/checkout@v5
        with:
          repository: fluxerapp-old/fluxer
          ssh-key: ${{ secrets.PRIVATE_REPO_DEPLOY_KEY }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: fluxer_app/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: fluxer_app
        run: pnpm install --frozen-lockfile

      - name: Update version in package.json
        working-directory: fluxer_app
        run: npm version ${{ needs.version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Build Electron main process
        working-directory: fluxer_app
        run: pnpm electron:compile

      - name: Build Electron app (macOS)
        if: matrix.platform == 'macos'
        working-directory: fluxer_app
        env:
          BUILD_CHANNEL: stable
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm exec electron-builder --config electron-builder.yml --mac --${{ matrix.electron_arch }}

      - name: Build Electron app (Windows)
        if: matrix.platform == 'windows'
        working-directory: fluxer_app
        env:
          BUILD_CHANNEL: stable
        run: pnpm exec electron-builder --config electron-builder.yml --win --${{ matrix.electron_arch }}

      - name: Build Electron app (Linux)
        if: matrix.platform == 'linux'
        working-directory: fluxer_app
        env:
          BUILD_CHANNEL: stable
        run: pnpm exec electron-builder --config electron-builder.yml --linux --${{ matrix.electron_arch }}

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p upload_staging
          # Copy Electron build artifacts
          if [ -d "fluxer_app/dist-electron" ]; then
            cp -r fluxer_app/dist-electron/* upload_staging/ || true
          fi
          # List what we have
          ls -la upload_staging/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fluxer-desktop-${{ env.CHANNEL }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            upload_staging/*.exe
            upload_staging/*.dmg
            upload_staging/*.zip
            upload_staging/*.AppImage
            upload_staging/*.yml
            upload_staging/*.blockmap
          retention-days: 30

  upload:
    name: Upload builds to S3
    needs: [version, build]
    runs-on: ubuntu-latest
    env:
      AWS_S3_ENDPOINT: https://s3.us-east-va.io.cloud.ovh.us
      AWS_S3_BUCKET: fluxer-dl
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
    steps:
      - name: Setup SSH key for private repo
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRIVATE_REPO_DEPLOY_KEY }}

      - name: Clone private repository
        uses: actions/checkout@v5
        with:
          repository: fluxerapp-old/fluxer
          ssh-key: ${{ secrets.PRIVATE_REPO_DEPLOY_KEY }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Upload all builds to S3
        run: go run ./scripts/ci/desktopci upload-electron --channel "${CHANNEL}" --artifacts artifacts --endpoint ${AWS_S3_ENDPOINT} --bucket ${AWS_S3_BUCKET} --version "${{ needs.version.outputs.version }}" --pub-date "${{ needs.version.outputs.pub_date }}"
