name: Build Desktop App (Stable)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-desktop-stable
  cancel-in-progress: true

env:
  CHANNEL: stable

jobs:
  version:
    name: Bump Stable Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      pub_date: ${{ steps.bump.outputs.pub_date }}
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Calculate and push next tag
        id: bump
        run: go run ./scripts/ci/desktopci bump

  build:
    name: Build for ${{ matrix.platform }} (${{ matrix.arch }})
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            arch: x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: msi,nsis
          - platform: windows
            arch: arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            bundle: msi,nsis
          - platform: macos
            arch: universal
            os: macos-latest
            target: universal-apple-darwin
            bundle: app,dmg
          - platform: linux
            arch: x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: appimage
          - platform: linux
            arch: arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bundle: appimage

    steps:
      - name: Setup SSH key for private repo
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRIVATE_REPO_DEPLOY_KEY }}

      - name: Clone private repository
        uses: actions/checkout@v5
        with:
          repository: fluxerapp-old/fluxer
          ssh-key: ${{ secrets.PRIVATE_REPO_DEPLOY_KEY }}

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Inject computed version into Tauri config
        working-directory: fluxer_app
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: go run ./scripts/ci/desktopci set-tauri --config src-tauri/tauri.conf.json --version "$VERSION"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: fluxer_app/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: fluxer_app
        run: pnpm install --frozen-lockfile

      - name: Prepare wrapper
        working-directory: fluxer_app
        env:
          BUILD_CHANNEL: stable
        run: pnpm prepare:wrapper

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: fluxer_app/src-tauri -> target
          prefix-key: ${{ matrix.target }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_CHANNEL: stable
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: fluxer_app
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p upload_staging
          cp -r fluxer_app/src-tauri/target/${{ matrix.target }}/release/bundle/* upload_staging/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fluxer-desktop-${{ env.CHANNEL }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: upload_staging/
          retention-days: 30

  upload:
    name: Upload builds to S3
    needs: [version, build]
    runs-on: ubuntu-latest
    env:
      AWS_S3_ENDPOINT: https://s3.us-east-va.io.cloud.ovh.us
      AWS_S3_BUCKET: fluxer-dl
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
    steps:
      - name: Setup SSH key for private repo
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRIVATE_REPO_DEPLOY_KEY }}

      - name: Clone private repository
        uses: actions/checkout@v5
        with:
          repository: fluxerapp-old/fluxer
          ssh-key: ${{ secrets.PRIVATE_REPO_DEPLOY_KEY }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload all builds to S3
        run: go run ./scripts/ci/desktopci upload --channel "${CHANNEL}" --artifacts artifacts --endpoint ${AWS_S3_ENDPOINT} --bucket ${AWS_S3_BUCKET} --version "${{ needs.version.outputs.version }}" --pub-date "${{ needs.version.outputs.pub_date }}"
